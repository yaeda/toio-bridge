name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install tools
        run: brew install swiftlint

      - name: Check Swift formatting
        run: |
          xcrun swift-format format --in-place --recursive --parallel --configuration .swift-format ToioBridge ToioBridgeTests
          git diff --exit-code -- ToioBridge ToioBridgeTests

      - name: Run SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml

      - name: Run tests
        run: xcodebuild test -project ToioBridge.xcodeproj -scheme ToioBridge -destination 'platform=macOS' -derivedDataPath .build/DerivedData CODE_SIGNING_ALLOWED=NO
